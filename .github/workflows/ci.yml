name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela ejecuciones anteriores del mismo ref si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: type-check · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm install (no npm ci) porque el lockfile se regenera localmente en
      # Windows y a veces las resoluciones de optional deps cross-platform
      # (@emnapi/* anidados bajo bindings wasm) divergen de lo que CI Linux
      # acepta. npm install reconcilia en runtime; sigue siendo determinista
      # respecto a package.json. `--no-audit --no-fund` reducen ruido.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Compila la app (detecta errores de RSC/rutas que el type-check no ve).
      # Usa env placeholder: las páginas ISR consultan Supabase en build-time;
      # con una URL inalcanzable el fetch falla de forma controlada (datos
      # vacíos) y no se necesitan secretos ni base real.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
